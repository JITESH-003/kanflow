services:
  - name: kanflow-api
    type: web
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm ci --include=dev && npm run build -w apps/api
    startCommand: npm run start:prod -w apps/api
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_ACCESS_TTL
        value: "15m"
      - key: JWT_REFRESH_TTL
        value: "7d"
      - key: WEB_ORIGIN
        sync: false
